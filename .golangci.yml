# .golangci.yml — golangci-lint v2 configuration
# Docs: https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 3m
  go: "1.22"
  tests: true

output:
  formats:
    text:
      path: stdout

linters:
  enable:
    # --- Bug detection ---
    - errcheck        # check that errors are handled
    - govet           # reports suspicious constructs
    - staticcheck     # comprehensive static analysis

    # --- Style & simplification ---
    - goconst         # finds repeated strings that could be constants
    - unused          # finds unused code

    # --- Performance ---
    - prealloc        # finds slice pre-allocation opportunities

    # --- Code quality ---
    - revive          # extensible linter (replaces golint)
    - misspell        # finds common misspellings
    - unconvert       # removes unnecessary type conversions
    - unparam         # finds unused function parameters
    - bodyclose       # checks HTTP response body is closed
    - noctx           # finds HTTP requests without context

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: false

    govet:
      enable-all: true
      disable:
        - fieldalignment # too noisy for library code

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: var-naming
        - name: range
        - name: receiver-naming
        - name: indent-error-flow
        - name: superfluous-else
        - name: unreachable-code

    misspell:
      locale: US

    goconst:
      min-len: 3
      min-occurrences: 3

  exclusions:
    rules:
      # Allow dot-imports in test files (e.g., for testify)
      - path: _test\.go
        linters:
          - revive
        text: "dot-imports"

      # Allow unused parameters in test helpers
      - path: _test\.go
        linters:
          - unparam

      # Allow fmt.Print* in cmd/
      - path: cmd/
        linters:
          - revive
        text: "exported"

formatters:
  enable:
    - gofmt           # checks code is gofmt-ed
    - goimports       # checks imports are sorted

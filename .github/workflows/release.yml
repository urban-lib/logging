# Release — auto-tag and create GitHub Release on merge to main
#
# Workflow:
#  1. Triggered on push to main (typically a merge from develop)
#  2. Analyzes commits since last tag using Conventional Commits
#  3. Determines version bump: feat → minor, fix → patch, BREAKING CHANGE → major
#  4. Creates a git tag (vX.Y.Z) and a GitHub Release with auto-generated changelog

name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    name: Tag & Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history for tag analysis

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch
          tag_prefix: v
          # Conventional Commits mapping:
          #   feat  → minor
          #   fix   → patch
          #   BREAKING CHANGE / feat! / fix! → major
          release_branches: main

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
